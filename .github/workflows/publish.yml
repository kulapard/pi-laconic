name: Publish

on:
  push:
    tags:
      - 'v[0-9]*'

# Never run two publishes for the same ref at once; don't cancel an
# in-flight publish (cancelling mid-publish can leave a half-published state).
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      # `npm publish` runs the `prepublishOnly` script (npm test → tsc + node
      # tests), so the suite gates the publish; no separate test job needed.
      - run: npm publish
